<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/ui/assets/style.css">
    </head>
    <body>
        <div id="main_sec">
            <nav>
                <span id="month-calendar" class="month-calendar"><img src="assets/img/cale.svg"></span>
            </nav>
            <div class="timer">
                <div class="location">
                    <img src="assets/img/location.svg" alt="">
                    <span id="location"></span>
                </div>
                <div class="time">
                    <p id="nextPrayerName" class="prayer-name"></p>
                    <p id="details"></p>
                    <p id="countDown" class="countDown">00:00:00</p>
                </div>
                <div class="date">
                    <span><img src="assets/img/calendar.svg"></span>
                    <span id="date"></span>
                </div>
                <img id="prayer_icon">
            </div>
            <ul id="prayers">
            </ul>
        </div>
        <div id="month_calendar_sec" style="display: none;">
            <nav>
                <h4 id="month_year"></h4>
                <span id="close"><img src="assets/img/right.svg"></span>
            </nav>
            <ul class="prayers">
                <li></li>
                <li d>الفجر</li>
                <li>الشروق</li>
                <li d>الظهر</li>
                <li>العصر</li>
                <li d>المغرب</li>
                <li>العشاء</li>
            </ul>
            <ul id="list">
            </ul>
        </div>
        <script src="/ui/script/popup.js"></script>
    </body>

</html>
